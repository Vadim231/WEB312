<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="stylesidemenu.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
<header>
    <div class="shapka">
        <img class="logo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-Wk9_bpPBj966WcsbfNz4Pt10mDpOYOHo2A&s">
        <p class="title">Vacao Nima</p>
    </div>
</header>
<hr/>
<div class="container_s">
    <div class="sidemenu">
        <div class="filter ">

        </div>
        <div>
            <label class="head">Цвет</label>
            <label class="choose"><input type="checkbox" > Белый</label><br>
            <label class="choose"><input type="checkbox" > Желтый</label><br>
            <label class="choose"><input type="checkbox" > Черный</label><br>
        </div>
        <div>
            <label class="head">Состояние</label>
            <label class="choose"><input type="checkbox"> Новое</label><br>
            <label class="choose"><input type="checkbox"> Отличное</label><br>
            <label class="choose"><input type="checkbox"> Хорошее</label><br>
            <label class="choose"><input type="checkbox"> Удовлетворительное</label><br>
            <label class="choose"><input type="checkbox"> Требуется ремонт</label><br>
        </div>
        <div>
            <label class="head">Цена, Р</label>
            <input id="minPrice" type="text" placeholder="От">
            <input id="maxPrice" type="text" placeholder="До">
        </div>
        <div>
            <label class="head">Прочее</label>
            <label class="choose"><input type="checkbox" id="wishlist">Избранные товары</label><br>
        </div>
    </div>
    <div class="container-search">
        <div class="search-container">
            <input type="text" id="search-input" name="" placeholder="Введите название для поиска...">
            <button type="button" id="search-button" name="" >Поиск</button>
        </div>
        <div id="results-container"></div>
        <div id="main-page"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
